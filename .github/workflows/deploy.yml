name: Deploy Next.js App

on:
  push:
    branches:
      - main # This tells GitHub to run this script only when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/portfolio
            
            # 1. Fetch the absolute latest map of the code from GitHub
            git fetch origin
            
            # 2. THE SAFEGUARD: Force the server to perfectly match GitHub, destroying local edits
            git reset --hard origin/main
            
            # 3. THE CLEANUP: Delete any untracked ghost files or folders blocking the build
            git clean -f -d
            
            # 4. Install dependencies and build
            npm install
            NODE_OPTIONS="--max-old-space-size=2048" npm run build
            
            # 5. Zero-downtime reload (falls back to 'start' if the app is currently offline)
            pm2 reload paolo-org || pm2 start npm --name "paolo-org" -- run start